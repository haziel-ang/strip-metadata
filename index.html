  .info-dot:active{transform:scale(.96)}
  .btn-outline{background:var(--field);color:var(--accent-deep);border:1.5px solid var(--clear-border)}
  .btn-outline:hover{background:var(--surface-2)}

  /* ANALISI ORIGINE AI */
  .ai-verdict{display:flex;gap:13px;align-items:flex-start;padding:14px;border-radius:14px;margin-bottom:14px;border:1px solid var(--line);background:var(--surface)}
  .ai-verdict.detected{background:var(--warn-bg);border-color:var(--warn-border)}
  .ai-verdict.maybe{background:var(--maybe-bg);border-color:var(--maybe-border)}
  .ai-verdict.clear{background:var(--clear-bg);border-color:var(--clear-border)}
  .ai-verdict .ic{flex:0 0 36px;height:36px;border-radius:10px;display:grid;place-items:center;font-size:19px;background:var(--field);border:1px solid var(--line)}
  .ai-verdict .tx h4{font-family:"Fraunces",serif;font-weight:500;font-size:1.05rem;line-height:1.2}
  .ai-verdict .tx p{font-size:.84rem;color:var(--ink-soft);margin-top:3px}
  .ai-verdict.detected .tx h4{color:var(--warn)}
  .ai-verdict.maybe .tx h4{color:var(--maybe-ink)}
  .ai-verdict.clear .tx h4{color:var(--accent-deep)}
  .ai-list{display:flex;flex-direction:column;gap:8px;margin-bottom:18px}
  .ai-why{max-width:none;margin:6px 0 18px}
  .ai-why summary{text-align:left}
  .pill.ai{color:var(--maybe-ink);background:var(--maybe-bg)}

  /* INFO POPUP */
  .info-card{width:min(720px,calc(100vw - 32px));max-width:720px;max-height:calc(100dvh - 32px);
    padding:0;overflow:hidden;display:flex;flex-direction:column}
  .info-card .modal-head{padding:22px 58px 18px 22px;margin-bottom:0;border-bottom:1px solid var(--line)}
  .info-card .modal-head .ok{font-family:"Fraunces",serif;font-size:1.1rem;font-weight:600;color:#fff}
  .info-scroll{padding:18px 22px 22px;overflow-y:auto;-webkit-overflow-scrolling:touch;min-height:0}
  .info-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-bottom:12px}
  .info-panel{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:13px}
  .info-panel h4{font-family:"Fraunces",serif;font-weight:500;font-size:1rem;margin-bottom:8px;line-height:1.2}
  .info-panel ul{list-style:none;display:flex;flex-direction:column;gap:7px}
  .info-panel li{position:relative;padding-left:17px;font-size:.84rem;color:var(--ink-soft);line-height:1.45}
  .info-panel li::before{content:"";position:absolute;left:0;top:.63em;width:6px;height:6px;border-radius:50%;background:var(--accent)}
  .info-privacy{margin:2px 0 12px;padding:12px 13px;border-radius:13px;border:1px solid var(--clear-border);
    background:var(--clear-bg);font-size:.86rem;color:var(--ink-soft);line-height:1.5}
  .info-note{margin:6px 0 0;font-size:.8rem;color:var(--ink-soft);line-height:1.45;font-style:italic}
  .info-deep{margin:0}
  .info-deep summary{display:flex;align-items:center;gap:8px;cursor:pointer;color:var(--accent-deep);font-size:.88rem;font-weight:700}
  .info-deep summary::-webkit-details-marker{display:none}
  .info-deep summary::before{content:"i";width:22px;height:22px;border-radius:50%;display:grid;place-items:center;
    background:var(--accent-soft);color:var(--accent-deep);font-family:"Fraunces",serif;font-size:.9rem}
  .info-deep p{font-size:.84rem;color:var(--ink-soft);line-height:1.55;margin-top:9px;background:var(--surface);
    border:1px solid var(--line);border-left:3px solid var(--accent);border-radius:10px;padding:11px 13px}

  @media (max-width:520px){
    body{padding-left:14px;padding-right:14px}
    .modal-card{width:calc(100vw - 20px);max-height:calc(100dvh - 20px);border-radius:20px;padding:18px}
    .info-card{width:calc(100vw - 20px);max-height:calc(100dvh - 20px);padding:0}
    .info-card .modal-head{padding:18px 54px 15px 18px}
    .info-scroll{padding:14px 16px 18px}
    .info-grid{grid-template-columns:1fr}
    .analyze-row{grid-template-columns:minmax(0,1fr) 44px}
    .info-dot{width:44px;height:44px}
    .batch-list{max-height:48dvh}
    .img-box img{max-height:36dvh}
  }
</style>
</head>
<body>
<div class="mesh"></div>
<div class="grain"></div>

<div class="controls">
  <button class="ctrl" id="langBtn" type="button" aria-label="Language">
    <svg viewBox="0 0 24 24" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3a15 15 0 0 1 0 18M12 3a15 15 0 0 0 0 18"/></svg>
    <span id="langTxt">IT</span>
  </button>
  <button class="ctrl" id="themeBtn" type="button" aria-label="Theme">
    <span id="themeIco"></span><span id="themeTxt"></span>
  </button>
</div>

<div class="wrap">
  <header>
    <div class="brand" aria-label="noMeta">
      <span class="brandname">n<svg class="ap" viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M12.23,1.25 L21.19,6.45 L15.86,9.46 Z M21.43,6.83 L21.40,17.18 L16.13,14.08 Z M21.19,17.58 L12.21,22.73 L12.26,16.61 Z M11.77,22.75 L2.81,17.55 L8.14,14.54 Z M2.57,17.17 L2.60,6.82 L7.87,9.92 Z M2.81,6.42 L11.79,1.27 L11.74,7.39 Z"/></svg>Meta</span>
    </div>
    <h1 data-i18n-html="ui.h1"></h1>
    <div class="badges">
      <span class="badge badge-lock"><svg class="lock-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V8a4 4 0 0 1 8 0v3"/></svg><span data-i18n="ui.footerLock"></span></span>
      <button class="badge badge-info" id="headerInfoBtn" type="button" aria-label="Apri approfondimenti"><span class="info-i">&#8505;</span></button>
    </div>
  </header>

  <div class="card">
    <div class="drop" id="drop">
      <div class="ring">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 16V4M12 4l-4 4M12 4l4 4"/><path d="M4 16v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"/>
        </svg>
      </div>
      <h2 data-i18n="ui.dropTitle"></h2>
      <p data-i18n="ui.dropDesc"></p>
      <div class="hint"><span>JPG</span>·<span>PNG</span>·<span>WebP</span>·<span>HEIC*</span></div>
      <input type="file" id="file" accept="image/*" class="hidden" multiple>
    </div>

    <div class="stage" id="stage">
      <div class="frame" id="frame">
        <img id="preview" alt="">
        <div class="statuschip" id="chip"><span class="spin"></span><span id="chiptx"></span></div>
      </div>
      <div class="body">
        <div class="choice" id="choice">
          <p class="choice-q" data-i18n="ui.choiceQ"></p>
          <button class="btn btn-primary" id="actClean">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21l4-1 11-11-3-3L4 17l-1 4z"/><path d="M14 6l3 3"/></svg>
            <span data-i18n="btn.clean"></span>
          </button>
          <div class="analyze-row">
            <button class="btn btn-outline" id="actAnalyze">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
              <span data-i18n="btn.analyze"></span>
            </button>
            <button class="info-dot" id="aiInfoBtn" type="button" aria-label="Info analisi AI" title="Info analisi AI">i</button>
          </div>
          <span class="sublabel" id="choiceHint"></span>
          <button class="relink" id="reset" data-i18n="ui.reset"></button>
        </div>
      </div>
    </div>

    <div class="batch" id="batch">
      <div class="batch-head"><span class="batch-title" id="batchTitle"></span></div>
      <div class="batch-list" id="batchList"></div>
      <div class="batch-actions">
        <button class="btn btn-primary" id="batchDownloadAll"></button>
        <button class="relink" id="batchReset" data-i18n="ui.reset"></button>
      </div>
    </div>
  </div>

  <footer>
    <div class="stat" id="statCleaned" hidden></div>
    <small class="credit" data-i18n-html="ui.credit"></small>
  </footer>
</div>

<!-- RESULT / ANALYSIS MODAL -->
<div class="modal" id="modal" aria-hidden="true">
  <div class="modal-backdrop" id="backdrop"></div>
  <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="mTitle">
    <button class="modal-close" id="mClose" aria-label="Chiudi">×</button>
    <div class="modal-head">
      <div class="ok"><svg viewBox="0 0 24 24"><path d="M4 12l5 5L20 6"/></svg></div>
      <div><h3 id="mTitle"></h3><p id="mSub"></p></div>
    </div>
    <div class="img-box"><img id="mImg" alt=""></div>
    <p class="ios-hint" id="iosHint"></p>
    <div class="m-sizes" id="mSizes"></div>
    <div class="m-section-title" id="mAITitle"></div>
    <div id="mAIWrap"></div>
    <div class="m-section-title" id="mMetaTitle"></div>
    <div class="m-meta" id="mMeta"></div>
    <div class="m-actions" id="mActions"></div>
  </div>
</div>

<!-- AI INFO POPUP -->
<div class="modal" id="infoModal" aria-hidden="true">
  <div class="modal-backdrop" id="infoBackdrop"></div>
  <div class="modal-card info-card" role="dialog" aria-modal="true" aria-labelledby="infoTitle">
    <button class="modal-close" id="infoClose" aria-label="Chiudi">×</button>
    <div class="modal-head">
      <div class="ok">i</div>
      <div><h3 id="infoTitle" data-i18n="info.title"></h3><p data-i18n="info.sub"></p></div>
      <span class="info-version" id="infoVersion"></span>
    </div>
    <div class="info-scroll">
      <div class="info-grid">
        <section class="info-panel">
          <h4 data-i18n="info.detectTitle"></h4>
          <ul>
            <li data-i18n="info.detect1"></li>
            <li data-i18n="info.detect2"></li>
            <li data-i18n="info.detect3"></li>
            <li data-i18n="info.detect4"></li>
          </ul>
        </section>
        <section class="info-panel">
          <h4 data-i18n="info.cleanTitle"></h4>
          <ul>
            <li data-i18n="info.clean1"></li>
            <li data-i18n="info.clean2"></li>
            <li data-i18n="info.clean3"></li>
          </ul>
        </section>
        <section class="info-panel">
          <h4 data-i18n="info.limitsTitle"></h4>
          <ul>
            <li data-i18n="info.limit1"></li>
            <li data-i18n="info.limit2"></li>
            <li data-i18n="info.limit3"></li>
          </ul>
        </section>
        <section class="info-panel">
          <h4 data-i18n="info.privacyTitle"></h4>
          <p class="info-privacy" data-i18n="info.privacy"></p>
          <details class="info-deep">
            <summary data-i18n="info.deepTitle"></summary>
            <p data-i18n="info.deep"></p>
          </details>
        </section>
        <section class="info-panel">
          <h4 data-i18n="info.safetyTitle"></h4>
          <p class="info-privacy" data-i18n-html="info.safetyText"></p>
          <p class="info-note" data-i18n="info.heic"></p>
        </section>
        <section class="info-panel">
          <h4 data-i18n="info.synthTitle"></h4>
          <p class="info-privacy" data-i18n-html="info.synthText"></p>
        </section>
      </div>
    </div>
  </div>
</div>

<!-- GPS MAP POPUP -->
<div class="modal" id="geoModal" aria-hidden="true">
  <div class="modal-backdrop" id="geoBackdrop"></div>
  <div class="modal-card geo-card" role="dialog" aria-modal="true" aria-labelledby="geoTitle">
    <button class="modal-close" id="geoClose" aria-label="Chiudi">×</button>
    <div class="modal-head">
      <div class="ok geo-pin">📍</div>
      <div><h3 id="geoTitle"></h3><p id="geoCoords"></p></div>
    </div>
    <div class="m-actions" id="geoActions"></div>
    <p class="geo-note" id="geoNote"></p>
  </div>
</div>

<script src="app.js?v=1.9.4" defer></script>
</body>
</html>
